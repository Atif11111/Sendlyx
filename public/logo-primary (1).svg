<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Icon: Abstract S from flowing stream lines -->
  <g transform="translate(8, 8)">
    <!-- S body: upper arc -->
    <path d="M 44 12 C 44 12 22 12 22 24 C 22 36 44 36 44 48 C 44 60 22 60 22 60"
          fill="none" stroke="url(#iconGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Stream lines: upper right -->
    <path d="M 44 14 L 58 10" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 46 20 L 62 18" fill="none" stroke="#818CF8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M 44 26 L 60 26" fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <!-- Stream lines: lower left -->
    <path d="M 22 48 L 8 52" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 22 54 L 6 56" fill="none" stroke="#818CF8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M 24 60 L 8 62" fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="51" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="28" font-weight="600" letter-spacing="-0.5" fill="#0F172A">Sendlyx</text>
</svg>
