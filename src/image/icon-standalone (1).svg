<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F1F3D"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>

  <!-- Abstract S from flowing stream lines -->
  <g transform="translate(18, 10)">
    <!-- Main S spine -->
    <path d="M 34 8 C 34 8 14 8 14 20 C 14 32 34 32 34 44 C 34 56 14 56 14 56"
          fill="none" stroke="url(#sGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Upper streams (right) -->
    <path d="M 33 10 L 44 6" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 35 17 L 47 15" fill="none" stroke="#93C5FD" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <path d="M 34 23 L 46 23" fill="none" stroke="#BFDBFE" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <!-- Lower streams (left) -->
    <path d="M 14 45 L 2 49" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M 14 51 L 1 53" fill="none" stroke="#93C5FD" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <path d="M 16 57 L 2 59" fill="none" stroke="#BFDBFE" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
