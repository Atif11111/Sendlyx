<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="680" height="340">
  <defs>
    <linearGradient id="cyanIndigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="blueViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="340" fill="#FFFFFF" rx="16"/>

  <!-- Title -->
  <text x="40" y="44" font-family="-apple-system,BlinkMacSystemFont,'Inter',sans-serif" font-size="13" font-weight="600" fill="#64748B" letter-spacing="2">SENDLYX BRAND COLORS</text>

  <!-- Primary swatches row 1 -->
  <!-- Navy 950 -->
  <rect x="40" y="64" width="88" height="88" rx="12" fill="#0A1628"/>
  <text x="84" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Navy 950</text>
  <text x="84" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#0A1628</text>
  <text x="84" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Primary BG</text>

  <!-- Navy 800 -->
  <rect x="148" y="64" width="88" height="88" rx="12" fill="#1E3A5F"/>
  <text x="192" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Navy 800</text>
  <text x="192" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#1E3A5F</text>
  <text x="192" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Surface</text>

  <!-- Electric Blue -->
  <rect x="256" y="64" width="88" height="88" rx="12" fill="#3B82F6"/>
  <text x="300" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Electric Blue</text>
  <text x="300" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#3B82F6</text>
  <text x="300" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Primary CTA</text>

  <!-- Indigo -->
  <rect x="364" y="64" width="88" height="88" rx="12" fill="#6366F1"/>
  <text x="408" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Indigo</text>
  <text x="408" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#6366F1</text>
  <text x="408" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Accent</text>

  <!-- Cyan -->
  <rect x="472" y="64" width="88" height="88" rx="12" fill="#22D3EE"/>
  <text x="516" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Cyan</text>
  <text x="516" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#22D3EE</text>
  <text x="516" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Highlight</text>

  <!-- Slate 50 -->
  <rect x="580" y="64" width="60" height="88" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="610" y="188" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#1E293B" text-anchor="middle">Slate 50</text>
  <text x="610" y="202" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">#F8FAFC</text>
  <text x="610" y="215" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Light BG</text>

  <!-- Gradient strip -->
  <text x="40" y="256" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#64748B">Brand gradient — Cyan → Indigo</text>
  <rect x="40" y="268" width="600" height="44" rx="10" fill="url(#cyanIndigo)"/>
  <text x="340" y="296" font-family="-apple-system,sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.85">#22D3EE → #3B82F6 → #818CF8</text>
</svg>
