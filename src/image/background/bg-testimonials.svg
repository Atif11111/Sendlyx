  <polyline points="1440,280 1320,280 1320,340 1180,340 1180,300 1000,300" fill="none" stroke="#4338CA" stroke-width="1" stroke-opacity="0.35"/>
  <polyline points="1440,420 1240,420 1240,380 1060,380 1060,440 900,440" fill="none" stroke="#312E81" stroke-width="0.8" stroke-opacity="0.3"/>
  <polyline points="1440,540 1280,540 1280,490 1140,490 1140,560 960,560" fill="none" stroke="#4338CA" stroke-width="0.8" stroke-opacity="0.28"/>

