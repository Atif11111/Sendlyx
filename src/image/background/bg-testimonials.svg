<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 700" width="1440" height="700">
  <defs>
    <linearGradient id="testBase" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0C1832"/>
      <stop offset="50%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="testGlow1" cx="25%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E3A5F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="testGlow2" cx="78%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#2D1B69" stop-opacity="0.6"/>
