    <stop offset="0%" stop-color="#0C1832" stop-opacity="0.9"/>
    <stop offset="15%" stop-color="#0C1832" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="testBotFade" x1="0%" y1="0%" x2="0%" y2="100%">
