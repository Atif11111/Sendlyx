  <circle cx="440" cy="300" r="2.5" fill="#818CF8" opacity="0.65"/>
  <circle cx="200" cy="420" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="380" cy="380" r="2.5" fill="#60A5FA" opacity="0.55"/>
  <circle cx="160" cy="540" r="3" fill="#6366F1" opacity="0.5"/>
  <circle cx="300" cy="490" r="2.5" fill="#818CF8" opacity="0.55"/>

