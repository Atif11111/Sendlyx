  <circle cx="1100" cy="200" r="3" fill="#6366F1" opacity="0.6"/>
  <circle cx="940" cy="160" r="2.5" fill="#818CF8" opacity="0.7"/>
  <circle cx="1320" cy="280" r="3" fill="#3B82F6" opacity="0.6"/>
  <circle cx="1180" cy="340" r="3" fill="#6366F1" opacity="0.55"/>
  <circle cx="1000" cy="300" r="2.5" fill="#818CF8" opacity="0.65"/>
  <circle cx="1240" cy="420" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="1060" cy="380" r="2.5" fill="#60A5FA" opacity="0.55"/>
  <circle cx="1280" cy="540" r="3" fill="#4F46E5" opacity="0.5"/>
  <circle cx="1140" cy="490" r="2.5" fill="#818CF8" opacity="0.55"/>

