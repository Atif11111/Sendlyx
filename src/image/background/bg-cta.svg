<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" width="1440" height="600">
  <defs>
    <linearGradient id="ctaBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0A2E"/>
      <stop offset="50%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>
    <radialGradient id="burstGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#818CF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyanRingFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="600" fill="url(#ctaBase)"/>

  <!-- Central glow -->
  <ellipse cx="720" cy="300" rx="700" ry="380" fill="url(#burstGlow)"/>
  <ellipse cx="720" cy="300" rx="400" ry="220" fill="url(#cyanGlow)"/>

  <!-- Orbital ring arcs — concentric ellipses -->
  <ellipse cx="720" cy="300" rx="180" ry="90" fill="none" stroke="url(#ringFade)" stroke-width="1.2" stroke-opacity="0.7"/>
  <ellipse cx="720" cy="300" rx="290" ry="145" fill="none" stroke="url(#ringFade)" stroke-width="1" stroke-opacity="0.55"/>
  <ellipse cx="720" cy="300" rx="400" ry="200" fill="none" stroke="url(#ringFade)" stroke-width="0.8" stroke-opacity="0.4"/>
  <ellipse cx="720" cy="300" rx="520" ry="260" fill="none" stroke="url(#cyanRingFade)" stroke-width="0.8" stroke-opacity="0.35"/>
  <ellipse cx="720" cy="300" rx="640" ry="320" fill="none" stroke="url(#ringFade)" stroke-width="0.6" stroke-opacity="0.25"/>
  <ellipse cx="720" cy="300" rx="760" ry="380" fill="none" stroke="url(#cyanRingFade)" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- Radial burst spokes -->
  <g stroke="#4F46E5" stroke-width="0.6" stroke-opacity="0.2">
    <line x1="720" y1="300" x2="720" y2="0"/>
    <line x1="720" y1="300" x2="720" y2="600"/>
    <line x1="720" y1="300" x2="1440" y2="300"/>
    <line x1="720" y1="300" x2="0" y2="300"/>
    <line x1="720" y1="300" x2="1080" y2="0"/>
    <line x1="720" y1="300" x2="360" y2="600"/>
    <line x1="720" y1="300" x2="360" y2="0"/>
    <line x1="720" y1="300" x2="1080" y2="600"/>
    <line x1="720" y1="300" x2="1440" y2="100"/>
    <line x1="720" y1="300" x2="0" y2="500"/>
    <line x1="720" y1="300" x2="1440" y2="500"/>
    <line x1="720" y1="300" x2="0" y2="100"/>
  </g>

  <!-- Dot markers on rings -->
  <circle cx="900" cy="300" r="3" fill="#818CF8" opacity="0.9"/>
  <circle cx="540" cy="300" r="3" fill="#818CF8" opacity="0.9"/>
  <circle cx="720" cy="210" r="3" fill="#60A5FA" opacity="0.9"/>
  <circle cx="720" cy="390" r="3" fill="#60A5FA" opacity="0.9"/>
  <circle cx="860" cy="237" r="2.5" fill="#22D3EE" opacity="0.8"/>
  <circle cx="580" cy="363" r="2.5" fill="#22D3EE" opacity="0.8"/>

  <circle cx="1010" cy="300" r="2.5" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="430" cy="300" r="2.5" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="910" cy="208" r="2" fill="#67E8F9" opacity="0.7"/>
  <circle cx="530" cy="392" r="2" fill="#67E8F9" opacity="0.7"/>

  <!-- Star field -->
  <circle cx="120" cy="80" r="1" fill="#BFDBFE" opacity="0.6"/>
  <circle cx="340" cy="40" r="1.5" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="580" cy="60" r="1" fill="#C7D2FE" opacity="0.5"/>
  <circle cx="980" cy="30" r="1.5" fill="#BFDBFE" opacity="0.6"/>
  <circle cx="1180" cy="80" r="1" fill="#C7D2FE" opacity="0.5"/>
  <circle cx="1360" cy="50" r="1.5" fill="#BFDBFE" opacity="0.55"/>
  <circle cx="80" cy="480" r="1" fill="#A5B4FC" opacity="0.4"/>
  <circle cx="240" cy="520" r="1.5" fill="#C7D2FE" opacity="0.5"/>
  <circle cx="1100" cy="540" r="1" fill="#BFDBFE" opacity="0.4"/>
  <circle cx="1320" cy="490" r="1.5" fill="#A5B4FC" opacity="0.5"/>
  <circle cx="160" cy="160" r="1" fill="#E0E7FF" opacity="0.4"/>
  <circle cx="1280" cy="140" r="1" fill="#E0E7FF" opacity="0.4"/>
  <circle cx="460" cy="480" r="1.2" fill="#BFDBFE" opacity="0.4"/>
  <circle cx="960" cy="520" r="1.2" fill="#BFDBFE" opacity="0.4"/>

  <!-- Edge darkening -->
  <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0F0A2E" stop-opacity="0.8"/>
    <stop offset="30%" stop-color="#0F0A2E" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="edgeRight" x1="100%" y1="0%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#0D1B3E" stop-opacity="0.8"/>
    <stop offset="30%" stop-color="#0D1B3E" stop-opacity="0"/>
  </linearGradient>
  <rect width="400" height="600" fill="url(#edgeLeft)"/>
  <rect x="1040" width="400" height="600" fill="url(#edgeRight)"/>
</svg>
